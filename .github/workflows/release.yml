name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          - os: windows
            arch: amd64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          output_name="siyuan-cli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-X siyuan/internal/cmd.version=${{ env.VERSION }}" -o "dist/${output_name}" ./cmd/siyuan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: siyuan-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/siyuan-cli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      sha256_arm64: ${{ steps.checksums.outputs.ARM64_SHA }}
      sha256_amd64: ${{ steps.checksums.outputs.AMD64_SHA }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: siyuan-cli-*

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -la release/

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          cd release
          for file in siyuan-cli-darwin-*; do
            shasum -a 256 "$file" > "${file}.sha256"
          done
          AMD64_SHA=$(cat siyuan-cli-darwin-amd64.sha256 | awk '{print $1}')
          ARM64_SHA=$(cat siyuan-cli-darwin-arm64.sha256 | awk '{print $1}')
          echo "AMD64_SHA=$AMD64_SHA" >> $GITHUB_OUTPUT
          echo "ARM64_SHA=$ARM64_SHA" >> $GITHUB_OUTPUT
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            release/siyuan-cli-*
          generate_release_notes: true

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release/*.sha256

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap repo
        uses: actions/checkout@v4
        with:
          repository: hcuong-me/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/siyuan-cli.rb << 'EOF'
          class SiyuanCli < Formula
            desc "CLI for SiYuan Note"
            homepage "https://github.com/hcuong-me/siyuan-cli"
            version "${{ needs.release.outputs.version }}"

            on_macos do
              on_arm do
                url "https://github.com/hcuong-me/siyuan-cli/releases/download/v${{ needs.release.outputs.version }}/siyuan-cli-darwin-arm64"
                sha256 "${{ needs.release.outputs.sha256_arm64 }}"
              end

              on_intel do
                url "https://github.com/hcuong-me/siyuan-cli/releases/download/v${{ needs.release.outputs.version }}/siyuan-cli-darwin-amd64"
                sha256 "${{ needs.release.outputs.sha256_amd64 }}"
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "siyuan-cli-darwin-arm64" => "siyuan-cli"
              else
                bin.install "siyuan-cli-darwin-amd64" => "siyuan-cli"
              end
            end

            test do
              system "#{bin}/siyuan-cli", "--version"
            end
          end
          EOF

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap
          branch: "siyuan-cli-${{ needs.release.outputs.version }}"
          title: "siyuan-cli: update to v${{ needs.release.outputs.version }}"
          body: |
            Update siyuan-cli formula to version ${{ needs.release.outputs.version }}

            - SHA256 arm64: ${{ needs.release.outputs.sha256_arm64 }}
            - SHA256 amd64: ${{ needs.release.outputs.sha256_amd64 }}
            - Release: https://github.com/hcuong-me/siyuan-cli/releases/tag/v${{ needs.release.outputs.version }}
          commit-message: "siyuan-cli: update to v${{ needs.release.outputs.version }}"
          delete-branch: true
